#                         Versión 1.3
#                         Días 1 - 60
#             DISCORD: https://discord.gg/BcgUCvGA9s
#
# Escribe "true" para activar la opción de discord.
Enable: false
# Ingresa el token de la aplicación de Discord.
Token: ''
# Elige el estado para tu bot
Status: '¡Permadeath!'
# Nombre de tu servidor
ServerName: 'Mi Permadeath'
# Notificar en discord cuando el plugin se enciende o apaga
Notify-Status: true
# Configura los canales
Channels:
  # Ingresa el ID del canal donde deben enviarse los mensajes de muerte.
  DeathChannel: ''
  # Canal de anuncios como tormenta, beginning, etc...
  Anuncios: ''
  # Canal donde se anunciarán los aumentos de dificultad
  CambiosDificultad: ''

# =========================================================
# Anuncios de Cambios de Dificultad
# =========================================================
# Cuando el servidor avance a uno de estos días, se enviará este texto a Discord
# y debajo se adjuntarán las imágenes indicadas. Puedes borrar los días o desactivarlos.
Habilitar-Anuncios-Dificultad: true
Cambios:
  10:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 10-19)!**
      - ¡Todas las arañas ahora tienen efectos de poción! entre 1 y 3 efectos aplicados: Velocidad 3, Regeneración 4, Fuerza 4, Salto 4, Brillo, Invisibilidad, Caida lenta y Resistencia 3
      - Hay el doble de Mobs
      - Mínimo 4 jugadores para pasar la noche
    Imagenes:
      - 'https://static.wikia.nocookie.net/permadeath/images/4/48/Primero_cambio_de_dificultad.jpg/revision/latest?cb=20200513062111&path-prefix=es'
  20:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 20-29)!**
      9 muertes no son nada... ¡DOLOR, SUFRIMIENTO... PERMANENTE! ¡MORID TODOS!
      - Todos los drops de pacíficos eliminados.
      - Ciclo de día y noche constante, no puedes saltar la noche.
      - Todos los mobs pacíficos son ahora agresivos, y los pigmans están cabreados de antemano.
      - Todas las arañas tienen ahora de 3 a 5 efectos.
      - 1 de cada 100 Ravagers suelta un Tótem de Inmortalidad.
      - Todos los Phantoms son ahora de tamaño 9 y doble de vida.
      - Ya no puedes ayudar o ser ayudado por jugadores externos a tu equipo.
      - Todas las arañas aparecen ahora con un esqueleto encima de 1 a 5 clases.
    Imagenes:
      - 'https://ejemplo.com/tu-imagen-dia20.png'
  30:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 30-39)!**
      Morid. :)
      - ESQUELETOS MEJORADOS (Guerrero, Infernal, Asesino, Táctico, Pesadilla).
      - Ya no se puede obtener la armadura de Netherite.
      - Ya no se pueden usar las Zonas Comunitarias a excepción del SPAWN.
      - Los Tótems tienen un 99% de probabilidades de activarse y 1% de fallar.
      - La batalla contra la dragona está completamente modificada.
      - Mobs especiales: Calamares->Guardianes Speed 2, Murciélagos->Blazes, Creepers->Eléctricos, Pillagers->Invisibles, Esqueletos->Con Clase, Pigmans->Diamante, Iron Golems->Speed 4, Endermans->Fuerza 2, Silverfish->5 Efectos, Shulkers->Explosivos. Aparecen Ender Ghasts y Ender Creepers.
    Imagenes:
      - 'https://ejemplo.com/tu-imagen-dia30.png'
  40:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 40-49)!**
      Bienvenidos al mismísimo INFIERNO.
      - Se habilita el fuego amigo. Se eliminan 5 slots del inventario.
      - Se establecen nuevas normas para evitar jugar de forma sedentaria.
      - Ya no se puede hacer stripmining ni branchmining.
      - Ya no se pueden craftear antorchas. Ya no se generan estructuras nuevas.
      - Todos los jugadores pierden 4 contenedores de vida.
      - Tótems tienen un 3% de fallar y se consumen 2.
      - Aparece el Permadeath Demon.
      - Phantoms llevan Esqueletos.
      - Brujas Imposibles, Vindicators con fuerza, y muchos más reemplazos locos de mobs.
      - Añadida la Super Golden Apple+ y Hyper Golden Apple+.
      - Gatos son ahora Supernova (arrasan bases).
      - The Beginning abierto. Pigman Jockeys.
    Imagenes:
      - 'https://ejemplo.com/tu-imagen-dia40.png'
  50:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 50-59)!**
      El día 50 es un día importante.
      - Gatos Supernova son ahora Gatos Galácticos (invocan mobs al morir).
      - Ya no se pueden craftear Cubos de Lava y Agua.
      - Tótems fallan 5%. Raids dan Hero of the Village 5 min.
      - Picar bloques quita medio corazón. Fundir ores da Pepitas.
      - Te ahogas 5 veces más rápido. Soulsand da Slowness 2.
      - Esqueletos suben de nivel. Armadura de Netherite Infernal.
      - Death Train ahora aumenta 30 min cada día.
      - Aparecen GIGANTES en Plains.
    Imagenes:
      - 'https://ejemplo.com/tu-imagen-dia50.png'
  60:
    Enabled: true
    Mensaje: |
      **¡AUMENTO DE DIFICULTAD (Día 60)!**
      You're dead now.
      - Ahora se puede craftear las Elytras de netherite infernal.
      - Cuando se usa un totem ahora se gastan 3. Tienen 7% de fallar.
      - Cada 60 minutos se spawnea un wither en tus bloques.
      - Iron golems tienen Fuerza 4, Velocidad 4, Resistencia 4 y Fire Res.
      - Creepers spawnean sin importar la luz.
      - Los jugadores tienen 8 horas para conseguir la orbe de vida, sino pierden 8 corazones.
      - Tarta de calabaza da Daño Instantáneo IV.
      - Los equipos se eliminan, solo quedan los originales.
      - Pierdes muchos más slots (se revierten con reliquia).
      - Esqueletos suben a nivel ULTRA.
    Imagenes:
      - 'https://ejemplo.com/tu-imagen-dia60.png'